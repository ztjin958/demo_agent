# ============================================================
# Multi-Agent AIOps Platform - Docker Compose
# ============================================================
# 启动 Milvus 向量数据库 (含 etcd + minio + standalone + attu UI)
#
# 使用:
#   docker compose up -d        # 启动
#   docker compose down         # 停止
#   docker compose logs -f      # 看日志
#
# 端口:
#   - 19530: Milvus gRPC
#   - 9091:  Milvus REST
#   - 9001:  MinIO 控制台 (root/Milvus)
#   - 8000:  Attu Milvus 可视化界面
#
# 注意: 如果你已经有其他 Milvus 实例在跑 (如 super_biz_agent_py),
#       请先停掉再启动本项目, 避免端口冲突.

version: "3.8"

services:
  etcd:
    container_name: multi-agent-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: multi-agent-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
    volumes:
      - ./volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: multi-agent-milvus
    image: milvusdb/milvus:v2.4.10
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ./volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - "etcd"
      - "minio"

  attu:
    container_name: multi-agent-attu
    image: zilliz/attu:v2.4
    environment:
      MILVUS_URL: standalone:19530
    ports:
      - "8000:3000"
    depends_on:
      - "standalone"

  redis:
    container_name: multi-agent-redis
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ./volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  open-websearch:
    container_name: multi-agent-open-websearch
    build:
      context: ./open-webSearch-main
    environment:
      NODE_ENV: production
      DEFAULT_SEARCH_ENGINE: ${OPEN_WEBSEARCH_ENGINE:-bing}
      SEARCH_MODE: ${OPEN_WEBSEARCH_SEARCH_MODE:-auto}
      ENABLE_CORS: "true"
      CORS_ORIGIN: "*"
    command: ["node", "build/index.js", "serve", "--host", "0.0.0.0", "--port", "3210"]
    ports:
      - "${OPEN_WEBSEARCH_PORT:-3210}:3210"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3210/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  default:
    name: multi_agent_network
